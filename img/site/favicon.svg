<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wheelchair wheel -->
    <circle cx="40" cy="60" r="90" stroke-width="22"/>
    <circle cx="40" cy="60" r="12" fill="#fff" stroke="none"/>
    <!-- Small front wheel -->
    <circle cx="-90" cy="120" r="28" stroke-width="18"/>
    <!-- Seat -->
    <path d="M-50,-60 L-50,40 L60,40" stroke-width="24"/>
    <!-- Backrest -->
    <path d="M-50,-60 L-50,-140" stroke-width="24"/>
    <!-- Handle -->
    <path d="M-50,-140 L-20,-150" stroke-width="20"/>
    <!-- Armrest -->
    <path d="M-50,-10 L30,-10" stroke-width="18"/>
    <!-- Electric bolt -->
    <path d="M140,-40 L120,0 L150,0 L130,40" stroke="#00d2ff" stroke-width="20" fill="none"/>
  </g>
</svg>